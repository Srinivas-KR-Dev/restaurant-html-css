<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Srinivas KR" />
    <meta
      name="description"
      content="Contact information for Little Burger Shop"
    />
    <title>Contact Us - LBS</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="./js/main.js" defer></script>
  </head>

  <body>
    <header class="header">
      <h1 class="header__h1">Little Burger Shop</h1>

      <nav class="header__nav">
        <ul class="header__ul">
          <li><a href="index.html">Home</a></li>
          <li><a href="index.html#menu">Menu</a></li>
          <li><a href="hours.html">Hours</a></li>
          <li><a href="about.html">About</a></li>
        </ul>
      </nav>
    </header>

    <section class="hero">
      <figure>
        <img
          src="images/burger_close_up_1000x649.jpg"
          alt="Little Burger Shop burger"
          title="Burgers ready to eat!"
          width="1000"
          height="649"
        />

        <figcaption class="offscreen">Little Burger Shop burger</figcaption>
      </figure>
    </section>

    <main class="main">
      <article class="main__article">
        <h2>Our Location</h2>

        <address>
          555 Burger Street
          <br />Bengaluru, KA 55555-5555 <br /><br />
          Phone: <a href="tel:555-555-5555">555-555-5555</a>
        </address>
      </article>
      <hr />
      <article class="main__article contact">
        <h2 class="contact__h2">Our Contact Form</h2>

        <form
          action="https://httpbin.org/post"
          method="post"
          class="contact__form"
        >
          <fieldset class="contact__fieldset">
            <legend class="offscreen">Send Us A Message</legend>

            <div class="contact__p">
              <label class="contact__label" for="name">Name: </label>
              <input
                class="contact__input"
                type="text"
                name="name"
                id="name"
                placeholder="your name"
                autocomplete="on"
                autofocus
                required
              />
            </div>

            <div class="contact__p">
              <label class="contact__label" for="email">Email: </label>
              <input
                class="contact__input"
                type="email"
                name="email"
                id="email"
                required
                placeholder="your email"
                autocomplete="on"
              />
            </div>

            <div class="contact__p">
              <label class="contact__label" for="message">Your Message:</label>

              <br />

              <textarea
                class="contact__textarea"
                name="message"
                id="message"
                cols="30"
                rows="10"
                placeholder="Type your message here"
                required
              ></textarea>
            </div>
          </fieldset>

          <button class="contact__button" type="submit">Send</button>
          <button class="contact__button" type="reset">Reset</button>
        </form>
      </article>
    </main>

    <footer class="footer">
      <p>
        <span class="nowrap"
          >Copyright &copy; <time class="js-year"></time
        ></span>
        <span class="nowrap">Little Burger Shop</span>
      </p>

      <p class="footer__p"><a href="#" class="footer__a">Back to Top</a></p>
    </footer>
  </body>
</html>
