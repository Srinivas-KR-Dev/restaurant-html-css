<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Srinivas KR" />
    <meta
      name="description"
      content="The official website for Little Burger Shop"
    />
    <title>LBS</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="./js/main.js" defer></script>
  </head>

  <body>
    <header class="header">
      <h1 class="header__h1">Little Burger Shop</h1>

      <nav class="header__nav">
        <ul class="header__ul">
          <li><a href="#menu">Menu</a></li>
          <li><a href="hours.html">Hours</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li><a href="about.html">About</a></li>
        </ul>
      </nav>
    </header>

    <section class="hero">
      <h2 class="hero__h2">Fresh Off the Grill!</h2>

      <figure>
        <img
          src="images/burger_combo_1000x667.jpg"
          alt="Burger with onion rings"
          title="We love burgers!"
          width="1000"
          height="667"
        />

        <figcaption class="offscreen">Burger with onion rings</figcaption>
      </figure>
    </section>

    <main class="main">
      <article id="menu" class="main__article menu">
        <h2>Our Menu</h2>

        <table class="menu__container">
          <caption class="offscreen">
            Our Burgers
          </caption>
          <thead>
            <tr>
              <th class="menu__header" scope="col">Burgers</th>
              <th class="menu__header" scope="col">Quantity</th>
              <th class="menu__header" scope="col">Price</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <th class="menu__item menu__cr" rowspan="3" scope="row">
                Classic
              </th>
              <td class="menu__item">1</td>
              <td class="menu__item">₹150</td>
            </tr>
            <tr>
              <td class="menu__item">2</td>
              <td class="menu__item">₹250</td>
            </tr>
            <tr>
              <td class="menu__item">3</td>
              <td class="menu__item">₹325</td>
            </tr>
            <tr>
              <th class="menu__item menu__sf" rowspan="3" scope="row">
                Cheese
              </th>
              <td class="menu__item">1</td>
              <td class="menu__item">₹200</td>
            </tr>
            <tr>
              <td class="menu__item">2</td>
              <td class="menu__item">₹350</td>
            </tr>
            <tr>
              <td class="menu__item">3</td>
              <td class="menu__item">₹450</td>
            </tr>
          </tbody>
          <tfoot>
            <tr>
              <td class="menu__item menu__cs" colspan="3">
                Fries &amp; Soda ₹20
              </td>
            </tr>
          </tfoot>
        </table>
      </article>
    </main>

    <footer class="footer">
      <p>
        <span class="nowrap"
          >Copyright &copy; <time class="js-year"></time
        ></span>
        <span class="nowrap">Little Burger Shop</span>
      </p>

      <p class="footer__p"><a href="#" class="footer__a">Back to Top</a></p>
    </footer>
  </body>
</html>
